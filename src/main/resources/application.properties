#משנה PORT כי עושה שגיאה שתפוס...
server.port=8085
# חיבור למסד הנתונים שיצרת ב-phpMyAdmin
spring.datasource.url=jdbc:mysql://localhost:3306/public_transport_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# ב-XAMPP כברירת מחדל אין סיסמה, אז תשאירי ריק אחרי השווה
spring.datasource.password=

# הגדרות Hibernate ליצירת טבלאות אוטומטית
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# הגדרה לטיפול ב-404 על ידי ה-Controller שלנו
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false